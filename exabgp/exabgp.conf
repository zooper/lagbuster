# ExaBGP Configuration for router-jc01
# iBGP Control Plane for ECMP routing
# Controlled by Lagbuster via API

# Process for receiving commands from Lagbuster
process lagbuster-api {
    run /opt/lagbuster/exabgp-control.py;
    encoder json;
}

# iBGP session to edge-nyc01
neighbor 2a0e:97c0:e61:ff80::d {
    description "edge-nyc01 iBGP";
    router-id 10.0.0.10;  # router-jc01
    local-address 2a0e:97c0:e61:ff80::e;
    local-as 215855;
    peer-as 215855;

    family {
        ipv6 unicast;
    }

    # Allow API control
    api {
        processes [lagbuster-api];
    }
}

# iBGP session to router-ash01
neighbor 2a0e:97c0:e61:ff80::9 {
    description "router-ash01 iBGP";
    router-id 10.0.0.10;  # router-jc01
    local-address 2a0e:97c0:e61:ff80::a;
    local-as 215855;
    peer-as 215855;

    family {
        ipv6 unicast;
    }

    # Allow API control
    api {
        processes [lagbuster-api];
    }
}
